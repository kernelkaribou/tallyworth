<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Tallyworth{% endblock %}</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/output.css') }}"
    />
    <script
      src="{{ url_for('static', filename='js/htmx.min.js') }}"
      defer
    ></script>
  </head>
  <body class="h-full bg-slate-50 text-slate-900">
    <header class="border-b border-slate-200 bg-white">
      <div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-4">
        <a href="{{ url_for('main.index') }}" class="text-xl font-semibold">
          Tallyworth
        </a>
        <nav class="flex gap-4 text-sm text-slate-600">
          <a class="hover:text-slate-900" href="{{ url_for('main.index') }}">Dashboard</a>
          <a class="hover:text-slate-900" href="{{ url_for('accounts.list_accounts') }}">Accounts</a>
          <a class="hover:text-slate-900" href="{{ url_for('cashflow.list_cashflow') }}">Cashflow</a>
          <a class="hover:text-slate-900" href="{{ url_for('accounts.list_account_types') }}">Types</a>
        </nav>
      </div>
    </header>
    <main class="mx-auto max-w-5xl px-4 py-8">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="mb-6 space-y-2">
            {% for category, message in messages %}
              <div
                class="rounded-lg border px-4 py-2 text-sm
                {% if category == 'error' %}border-red-200 bg-red-50 text-red-800
                {% else %}border-emerald-200 bg-emerald-50 text-emerald-800{% endif %}"
              >
                {{ message }}
              </div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
  </body>
</html>
